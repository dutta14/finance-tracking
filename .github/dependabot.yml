# Dependabot v2 — automated dependency updates
# Docs: https://docs.github.com/en/code-security/dependabot/configuration-options
version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    target-branch: "main"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    assignees:
      - "dutta14"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions version updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    target-branch: "main"
    open-pull-requests-limit: 10
    labels:
      - "ci"
    assignees:
      - "dutta14"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
